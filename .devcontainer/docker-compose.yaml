services:
  app:
    build: 
      context: .. 
      dockerfile: .devcontainer/Dockerfile
    working_dir: "/workspaces/PROMPT ENGINEERING"
    env_file:
      - ../.env
    volumes:
      - ../..:/workspaces:cached

    command:
      - uvicorn
      - rag_queue.server:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    depends_on:
      - redis
      - vector-db

  redis:
    image: redis:latest

  vector-db:
    image: "qdrant/qdrant"
    ports:
      - "6333:6333"

  mongodb:
    image: mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongodb_data:/data/db
volumes:
  mongodb_data: